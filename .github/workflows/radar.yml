name: "📡 iPhone Price Radar"

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  radar:
    name: "Scan de Preços"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: "📥 Checkout do repositório"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "📦 Instalar dependências"
        run: pip install -r requirements.txt

      - name: "🔍 Executar radar de preços"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python src/main.py

      - name: "💾 Commitar histórico de preços atualizado"
        run: |
          git config --local user.email "iphone-radar[bot]@github.com"
          git config --local user.name "iPhone Radar Bot"
          git add data/prices.json data/debug.json
          git diff --staged --quiet || git commit -m "📊 Preços atualizados — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
